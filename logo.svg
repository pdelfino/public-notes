<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" fill="none">
  <g transform="translate(150, 48)">
    <!-- Half sun arc (opening upward) -->
    <path d="M-24,0 A24,24 0 0,1 24,0" stroke="#c8943e" stroke-width="2.5" fill="none"/>
    <!-- 7 rays fanning upward, starting above the arc -->
    <!-- Center ray (vertical, tallest) -->
    <line x1="0" y1="-26" x2="0" y2="-40" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 1st pair from center -->
    <line x1="0" y1="-26" x2="0" y2="-38" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round" transform="rotate(-22, 0, 0)" />
    <line x1="0" y1="-26" x2="0" y2="-38" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round" transform="rotate(22, 0, 0)" />
    <!-- 2nd pair from center -->
    <line x1="0" y1="-26" x2="0" y2="-36" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round" transform="rotate(-44, 0, 0)" />
    <line x1="0" y1="-26" x2="0" y2="-36" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round" transform="rotate(44, 0, 0)" />
    <!-- 3rd pair (outermost, shortest) -->
    <line x1="0" y1="-26" x2="0" y2="-33" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round" transform="rotate(-66, 0, 0)" />
    <line x1="0" y1="-26" x2="0" y2="-33" stroke="#c8943e" stroke-width="2.5" stroke-linecap="round" transform="rotate(66, 0, 0)" />
  </g>
  <!-- LE DAY CLUB text -->
  <text x="150" y="75" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" letter-spacing="6" fill="#c8943e">LE DAY CLUB</text>
  <!-- INVITE ONLY text -->
  <text x="150" y="95" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="4" fill="#c8943e" opacity="0.8">INVITE ONLY</text>
</svg>
